<!doctype html>
<html lang="en" color-scheme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    
    <!-- Primary SEO -->
    <title>Eliza Digital Solutions — Marketing, Content, Video, Web & Software</title>
    <meta name="description" content="Eliza Digital Solutions is a full-stack creative + tech agency delivering digital marketing, content creation, video ads, websites, software, and branding that drives real results." />
    <link rel="canonical" href="https://elizadigital.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://elizadigital.com/" />
    <meta property="og:title" content="Eliza Digital Solutions — We build brands the internet remembers." />
    <meta property="og:description" content="A modern full-stack creative + tech agency. Marketing, content, video, web, software & branding under one roof." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@elizadigital" />
    <meta name="twitter:title" content="Eliza Digital Solutions" />
    <meta name="twitter:description" content="A modern full-stack creative + tech agency." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#08080b" />

    <!-- JSON-LD Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Eliza Digital Solutions",
      "url": "https://elizadigital.com",
      "logo": "https://elizadigital.com/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@elizadigital.com",
        "contactType": "customer service"
      },
      "sameAs": [
        "https://twitter.com/elizadigital",
        "https://linkedin.com/company/elizadigital",
        "https://instagram.com/elizadigital"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Digital Services",
        "itemListElement": [
          { "@type": "Offer", "name": "Digital Marketing" },
          { "@type": "Offer", "name": "Content Creation" },
          { "@type": "Offer", "name": "Video Ads" },
          { "@type": "Offer", "name": "Websites" },
          { "@type": "Offer", "name": "Software" },
          { "@type": "Offer", "name": "Branding" }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
